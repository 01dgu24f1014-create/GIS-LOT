<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TAMAN SAUJANA PUTRA</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* ================= HEADER ================= */
        #header {
            position: relative;
            width: 100%;
            height: 80px;
            background: #5a3e2b;
            display: flex;
            align-items: center;
            padding: 0 40px;
            color: white;
            z-index: 7000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #header h1 {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }

        /* ================= MAP ================= */
        #map {
            position: absolute;
            top: 80px;
            bottom: 35px; /* Ruang untuk footer */
            width: 100%;
            z-index: 1000;
        }

        /* ================= LEFT DASHBOARD & MENU BUTTON ================= */
        #menuBtn {
            position: absolute;
            top: 100px;
            left: 15px;
            background: #8b5e3c;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 6000;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 2px solid white;
            transition: 0.2s;
        }

        #menuBtn:hover {
            background: #5a3e2b;
        }

        #dashboard {
            position: absolute;
            top: 80px;
            left: -350px;
            width: 320px;
            bottom: 35px;
            background: white;
            z-index: 6500;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
            transition: left 0.4s ease;
        }

        #dashboard.active {
            left: 0; /* Dashboard terbuka bila class 'active' ditambah */
        }

        .dashboard-section {
            margin-bottom: 20px;
        }

        .dashboard-section label {
            font-weight: bold;
            color: #5a3e2b;
            display: block;
            margin-bottom: 5px;
        }

        .dashboard-section input[type="text"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .dashboard-section button {
            width: 100%;
            padding: 10px;
            background: #8b5e3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .dashboard-section button:hover {
            background: #5a3e2b;
        }

        .dashboard-info {
            background: #f9f9f9;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ================= LAYERS PANEL (RIGHT) ================= */
        #gmLayersBtn {
            position: absolute;
            bottom: 60px;
            right: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 6000;
            padding: 10px 15px;
            font-weight: bold;
            color: #5a3e2b;
            border: 2px solid #8b5e3c;
        }

        #gmPanel {
            position: absolute;
            bottom: 110px;
            right: 20px;
            width: 220px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            z-index: 6500;
            padding: 15px;
            display: none; /* Disorok pada asalnya */
        }

        #gmPanel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #5a3e2b;
        }

        .gmOption {
            margin-bottom: 8px;
            font-size: 14px;
        }

        /* ================= FOOTER ================= */
        #footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: #8b5e3c;
            color: white;
            text-align: center;
            line-height: 35px;
            font-size: 14px;
            z-index: 7000;
        }
    </style>
</head>

<body>

    <div id="header">
        <h1>TAMAN SAUJANA PUTRA</h1>
    </div>

    <div id="map"></div>

    <div id="menuBtn">☰ Menu Dashboard</div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; color:#5a3e2b;">DASHBOARD</h2>
            <button id="closeDashboard" style="background:red; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">✖</button>
        </div>
        <hr style="border-color:#ccc; margin: 15px 0;">

        <div class="dashboard-section">
            <label>Carian Lot (Land Explorer)</label>
            <input type="text" id="searchLot" placeholder="Masukkan No Lot (cth: 1234)">
            <button id="findLot">Cari Lot</button>
            <button id="resetLot" style="background:#555;">Reset Carian</button>
        </div>

        <div class="dashboard-section">
            <label>Maklumat Lot Dipilih</label>
            <div id="lotInfo" class="dashboard-info">
                <i>Sila klik pada mana-mana lot di peta atau buat carian.</i>
            </div>
        </div>
    </div>

    <div id="gmLayersBtn">🌍 Susunan Peta (Layers)</div>

    <div id="gmPanel">
        <h3>Jenis Peta (Basemap)</h3>
        <div class="gmOption"><input type="radio" name="basemap" id="satRadio" checked> Satellite</div>
        <div class="gmOption"><input type="radio" name="basemap" id="streetRadio"> Street</div>
        
        <hr style="border-color:#eee;">
        
        <h3>Data Layer</h3>
        <div class="gmOption"><input type="checkbox" id="lotCheck" checked> Papar Lot Tanah</div>
    </div>

    <div id="footer">
        Hak Cipta Terpelihara 2026 @ umrzcyn
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="data/LOTFINAL_0.js"></script>

    <script>
        // 1. SETUP MAP
        var map = L.map('map', {
            zoomControl: true,
            maxZoom: 22,
            minZoom: 5
        }).fitBounds([
            [2.103090, 102.520846],
            [2.104445, 102.523314] // Koordinat zoom kawasan Saujana Putra
        ]);

        // 2. SETUP BASEMAPS
        var satellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22 }).addTo(map);
        var street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 });

        // 3. STYLE UNTUK LOT TANAH
        function styleNormal() {
            return {
                color: '#ffffff', // Garisan putih
                weight: 1.5,
                fillColor: '#8b5e3c', // Warna coklat
                fillOpacity: 0.5
            };
        }

        function styleHighlight() {
            return {
                color: '#ff0000', // Garisan merah bila diklik
                weight: 3,
                fillColor: 'yellow', // Warna kuning bila diklik
                fillOpacity: 0.7
            };
        }

        var selectedLayer = null;

        // 4. FUNGSI KLIK PADA LOT
        function onEachFeature(feature, layer) {
            layer.on({
                click: function(e) {
                    // Reset warna lot yang dipilih sebelum ini
                    if (selectedLayer) {
                        selectedLayer.setStyle(styleNormal());
                    }

                    // Highlight lot baru
                    selectedLayer = layer;
                    layer.setStyle(styleHighlight());
                    layer.bringToFront();

                    // Ambil data dari properties GeoJSON (PENTING: Pastikan ejaan properties sama dengan fail QGIS/GeoJSON anda)
                    let noLot = feature.properties["NO_LOT"] || "Tiada Data";
                    let luas = feature.properties["AREA"] || "Tiada Data";
                    let namaPemilik = feature.properties["tsp — pe"] || feature.properties["PEMILIK"] || "Tiada Maklumat";

                    // Update Popup di Map
                    let popupContent = `
                        <b>No Lot:</b> ${noLot}<br>
                        <b>Keluasan:</b> ${parseFloat(luas).toFixed(2)} m²<br>
                        <b>Pemilik:</b> ${namaPemilik}
                    `;
                    layer.bindPopup(popupContent).openPopup();

                    // Update Dashboard di Kiri
                    document.getElementById("lotInfo").innerHTML = `
                        <b>No Lot:</b> ${noLot}<br>
                        <b>Keluasan:</b> ${parseFloat(luas).toFixed(2)} m²<br>
                        <b>Pemilik:</b> ${namaPemilik}
                    `;

                    // Buka dashboard secara automatik bila lot diklik (jika belum buka)
                    document.getElementById("dashboard").classList.add("active");
                }
            });
        }

        // Masukkan data lot ke dalam map
        var layerLot = new L.geoJson(json_LOTFINAL_0, {
            style: styleNormal,
            onEachFeature: onEachFeature
        }).addTo(map);


        // ================= FUNGSI INTERAKTIF BUTANG & PANEL =================

        // Buka/Tutup Dashboard Kiri
        document.getElementById("menuBtn").onclick = function() {
            document.getElementById("dashboard").classList.add("active");
        };
        document.getElementById("closeDashboard").onclick = function() {
            document.getElementById("dashboard").classList.remove("active");
        };

        // Buka/Tutup Panel Layers Kanan
        var gmPanel = document.getElementById("gmPanel");
        document.getElementById("gmLayersBtn").onclick = function() {
            if (gmPanel.style.display === "block") {
                gmPanel.style.display = "none";
            } else {
                gmPanel.style.display = "block";
            }
        };

        // Tukar Basemap (Satelit / Street)
        document.getElementById("satRadio").onclick = function() {
            map.removeLayer(street);
            map.addLayer(satellite);
        };
        document.getElementById("streetRadio").onclick = function() {
            map.removeLayer(satellite);
            map.addLayer(street);
        };

        // On/Off Layer Lot
        document.getElementById("lotCheck").onchange = function() {
            if (this.checked) {
                map.addLayer(layerLot);
            } else {
                map.removeLayer(layerLot);
            }
        };

        // ================= FUNGSI CARIAN (LAND EXPLORER) =================
        document.getElementById("findLot").onclick = function() {
            let searchValue = document.getElementById("searchLot").value.trim().toLowerCase();
            let dijumpai = false;

            if(searchValue === "") {
                alert("Sila masukkan nombor lot.");
                return;
            }

            layerLot.eachLayer(function(layer) {
                let noLot = (layer.feature.properties["NO_LOT"] || "").toString().toLowerCase();
                
                if (noLot === searchValue) {
                    dijumpai = true;
                    
                    // Zoom map ke lot
                    map.fitBounds(layer.getBounds());
                    
                    // Fire event klik pada lot tersebut supaya ia di-highlight dan maklumat dikemaskini
                    layer.fire('click'); 
                }
            });

            if(!dijumpai) {
                alert("Lot " + searchValue + " tidak dijumpai dalam pangkalan data.");
            }
        };

        // Fungsi Reset
        document.getElementById("resetLot").onclick = function() {
            document.getElementById("searchLot").value = "";
            document.getElementById("lotInfo").innerHTML = "<i>Sila klik pada mana-mana lot di peta atau buat carian.</i>";
            
            if (selectedLayer) {
                selectedLayer.setStyle(styleNormal());
                selectedLayer = null;
            }
            map.closePopup();
            
            // Reset zoom ke asal
            map.fitBounds([
                [2.103090, 102.520846],
                [2.104445, 102.523314]
            ]);
        };

    </script>
</body>
</html>
